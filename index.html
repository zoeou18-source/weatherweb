<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文青氣象儀表板 | Weather Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.2);
            --accent: #4facfe;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: white;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: background-image 1s ease-in-out, background-color 1s ease-in-out;
            background-color: #333;
            overflow-x: hidden;
        }

        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 0;
            pointer-events: none;
        }

        .main-dashboard {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* 頂部搜尋列 */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .search-section { display: flex; gap: 10px; }
        input {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            padding: 12px 18px;
            border-radius: 12px;
            color: white;
            width: 250px;
            outline: none;
            backdrop-filter: blur(5px);
        }
        input::placeholder { color: rgba(255,255,255,0.7); }
        button {
            background: var(--accent);
            border: none;
            padding: 0 22px;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { opacity: 0.8; }

        /* 三欄排版架構 */
        .three-columns {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 1024px) {
            .three-columns { grid-template-columns: 1fr; }
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        /* 左欄元件 */
        .temp-big { font-size: 5rem; font-weight: bold; margin: 5px 0; }
        #map { height: 280px; border-radius: 15px; margin-top: 10px; z-index: 1; }
        .label { border-left: 4px solid var(--accent); padding-left: 12px; margin-bottom: 20px; font-size: 0.9rem; opacity: 0.8; }

        /* 紫外線程度圖元件 */
        .uv-section { margin-top: 10px; }
        .uv-title { font-size: 0.95rem; margin-bottom: 45px; opacity: 0.9; }
        .uv-gauge-container { position: relative; margin: 0 10px; }
        .uv-bar {
            height: 10px; width: 100%; border-radius: 5px;
            background: linear-gradient(to right, #289500, #f7e400, #f85900, #d80010, #6b49c8);
        }
        .uv-arrow {
            position: absolute; top: -42px; left: 0%; transform: translateX(-50%);
            transition: left 1s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            text-align: center; width: 60px;
        }
        .uv-arrow-num { font-weight: 900; font-size: 1.6rem; color: #fff; text-shadow: 0 0 8px rgba(0,0,0,0.8); }
        .arrow-head { font-size: 14px; margin-top: -5px; }

        /* 建議與提醒文字 */
        .advice-text { margin-top: 12px; font-size: 1rem; font-weight: 500; }
        .divider { border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 20px 0; }

        /* 新聞區塊 */
        .news-link { display: block; text-decoration: none; color: white; border-radius: 15px; overflow: hidden; position: relative; }
        .news-img { width: 100%; height: 150px; object-fit: cover; transition: transform 0.3s; }
        .news-link:hover .news-img { transform: scale(1.05); }
        .news-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: linear-gradient(transparent, rgba(0,0,0,0.85));
            padding: 15px 10px 10px; font-size: 0.85rem;
        }

        /* 預報列表 */
        .week-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .week-item:last-child { border-bottom: none; }
    </style>
</head>
<body>

<div class="bg-overlay"></div>

<div class="main-dashboard">
    <div class="top-bar">
        <div class="search-section">
            <input type="text" id="cityInput" placeholder="搜尋城市 (如: 台北 或 Tokyo)" spellcheck="false">
            <button id="searchBtn">搜尋</button>
        </div>
        <div id="todayDate">載入中...</div>
    </div>

    <div class="three-columns">
        <div class="column">
            <div class="glass-card main-temp-card">
                <h1 id="cityName">--</h1>
                <div class="temp-big"><span id="currentTemp">--</span>°C</div>
                <p id="weatherDesc">載入中...</p>
                <div class="info-row">今日降雨: <span id="rainVal">0</span> mm</div>
            </div>
            <div class="glass-card map-card">
                <h3 class="label">衛星雲圖</h3>
                <div id="map"></div>
            </div>
        </div>

        <div class="column">
            <div class="glass-card">
                <h3 class="label">未來一週天氣預報</h3>
                <div id="weeklyForecast"></div>
            </div>
        </div>

        <div class="column">
            <div class="glass-card">
                <h3 class="label">生活氣象提醒</h3>
                <div class="feels-like-box">
                    <div class="feels-label">體感溫度 <span id="feelsTemp">--</span>°C</div>
                    <div id="tempAdvice" class="advice-text"></div>
                </div>
                <hr class="divider">
                <div class="uv-section">
                    <div class="uv-title">今日紫外線</div>
                    <div class="uv-gauge-container">
                        <div id="uvArrow" class="uv-arrow">
                            <div class="uv-arrow-num" id="uvNumber">0</div>
                            <div class="arrow-head">▼</div>
                        </div>
                        <div class="uv-bar"></div>
                    </div>
                    <div class="uv-scale-labels" style="display:flex; justify-content:space-between; font-size:0.7rem; margin-top:5px; opacity:0.6;">
                        <span>低</span><span>中</span><span>高</span><span>極高</span>
                    </div>
                    <div id="uvAdvice" class="advice-text"></div>
                </div>
            </div>

            <div class="glass-card">
                <h3 class="label">今日焦點新聞</h3>
                <div id="newsContainer"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const API_KEY = "bd5e378503939ddaee76f12ad7a97608";
    const BASE_URL = "https://api.openweathermap.org/data/2.5/";
    let map;

    // 1. 背景控制
    function updateBackground(weatherMain) {
        const body = document.body;
        const configs = {
            Clear: { img: "https://images.unsplash.com/photo-1502444330042-d1a1ddf9bb5b?q=80&w=1920", color: "#4facfe" },
            Clouds: { img: "https://images.unsplash.com/photo-1599863261649-755734568194?q=80&w=1920", color: "#757F9A" },
            Rain: { img: "https://images.unsplash.com/photo-1511216335778-7cb8f49fa7a3?q=80&w=1920", color: "#29323c" },
            Drizzle: { img: "https://images.unsplash.com/photo-1511216335778-7cb8f49fa7a3?q=80&w=1920", color: "#29323c" },
            Thunderstorm: { img: "https://images.unsplash.com/photo-1605723517503-3cadb5818a0c?q=80&w=1920", color: "#0f0c29" }
        };
        const config = configs[weatherMain] || configs.Clear;
        body.style.backgroundImage = `url('${config.img}')`;
        body.style.backgroundColor = config.color;
    }

    // 2. 紫外線控制
    function updateUV(uvi) {
        const arrow = document.getElementById("uvArrow");
        const num = document.getElementById("uvNumber");
        const advice = document.getElementById("uvAdvice");
        let percent = (uvi / 11) * 100;
        if (percent > 100) percent = 100;
        arrow.style.left = `${percent}%`;
        num.innerText = Math.round(uvi);
        if (uvi >= 4) {
            advice.innerText = "☀️ 出門要記得擦防曬、撐陽傘哦！";
            advice.style.color = "#ffeb3b";
        } else {
            advice.innerText = "🍃 今天紫外線不高，safe!";
            advice.style.color = "#a5ff8a";
        }
    }

    // 3. 體感溫度提醒
    function updateFeelsLike(temp) {
        document.getElementById("feelsTemp").innerText = Math.round(temp);
        const advice = document.getElementById("tempAdvice");
        if (temp <= 20) {
            advice.innerText = "❄️ 天氣寒冷，要注意保暖哦！";
            advice.style.color = "#8af3ff";
        } else {
            advice.innerText = "🔥 天氣有些炎熱，小心中暑！";
            advice.style.color = "#ff8a8a";
        }
    }

    // 4. 地圖控制
    function updateMap(lat, lon) {
        if (!map) {
            map = L.map('map').setView([lat, lon], 8);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            L.tileLayer(`https://tile.openweathermap.org/map/clouds_new/{z}/{x}/{y}.png?appid=${API_KEY}`).addTo(map);
        } else {
            map.setView([lat, lon], 8);
        }
    }

    // 5. 新聞模組
    function updateNews(city) {
        const container = document.getElementById("newsContainer");
        const newsImg = "https://images.unsplash.com/photo-1504711434969-e33886168f5c?q=80&w=600";
        const newsLink = `https://news.google.com/search?q=${encodeURIComponent(city)}+天氣+新聞`;
        container.innerHTML = `
            <a href="${newsLink}" target="_blank" class="news-link">
                <img src="${newsImg}" class="news-img">
                <div class="news-overlay">點擊查看 ${city} 即時新聞焦點...</div>
            </a>
        `;
    }

    // 6. 核心抓取
    async function getWeatherData(city) {
        try {
            const res = await fetch(`${BASE_URL}weather?q=${city}&units=metric&lang=zh_tw&appid=${API_KEY}`);
            const data = await res.json();
            if (data.cod === "404") return alert("找不到城市");

            document.getElementById("cityName").innerText = data.name;
            document.getElementById("currentTemp").innerText = Math.round(data.main.temp);
            document.getElementById("weatherDesc").innerText = data.weather[0].description;
            document.getElementById("rainVal").innerText = data.rain ? data.rain['1h'] || 0 : 0;
            document.getElementById("todayDate").innerText = new Date().toLocaleDateString('zh-TW', { month: 'long', day: 'numeric', weekday: 'long' });

            updateBackground(data.weather[0].main);
            updateFeelsLike(data.main.feels_like);
            updateMap(data.coord.lat, data.coord.lon);
            updateNews(data.name);

            const uvRes = await fetch(`${BASE_URL}uvi?lat=${data.coord.lat}&lon=${data.coord.lon}&appid=${API_KEY}`);
            const uvData = await uvRes.json();
            updateUV(uvData.value);

            const fRes = await fetch(`${BASE_URL}forecast?q=${city}&units=metric&lang=zh_tw&appid=${API_KEY}`);
            const fData = await fRes.json();
            renderWeekly(fData.list);
        } catch (err) { console.error(err); }
    }

    function renderWeekly(list) {
        const container = document.getElementById("weeklyForecast");
        container.innerHTML = "";
        const daily = {};
        list.forEach(item => {
            const date = new Date(item.dt * 1000).toLocaleDateString();
            if (!daily[date]) daily[date] = { max: -99, min: 99, icon: item.weather[0].icon, day: new Date(item.dt * 1000).toLocaleDateString('zh-TW', {weekday: 'short'}) };
            if (item.main.temp_max > daily[date].max) daily[date].max = item.main.temp_max;
            if (item.main.temp_min < daily[date].min) daily[date].min = item.main.temp_min;
        });
        Object.keys(daily).slice(1, 8).forEach(date => {
            const d = daily[date];
            container.innerHTML += `
                <div class="week-item">
                    <span>${d.day}</span>
                    <img src="https://openweathermap.org/img/wn/${d.icon}.png" width="35">
                    <span>${Math.round(d.max)}° / ${Math.round(d.min)}°</span>
                </div>`;
        });
    }

    document.getElementById("searchBtn").addEventListener("click", () => getWeatherData(document.getElementById("cityInput").value));
    document.getElementById("cityInput").addEventListener("keypress", (e) => e.key === "Enter" && getWeatherData(e.target.value));

    // 預設執行
    getWeatherData("Taipei");
</script>

</body>
</html>
